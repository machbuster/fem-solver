<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FEM Solver</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
        .header { background: #16213e; padding: 20px 40px; border-bottom: 2px solid #0f3460; }
        .header h1 { color: #e94560; font-size: 24px; }
        .header p { color: #aaa; font-size: 13px; margin-top: 4px; }
        .container { display: flex; height: calc(100vh - 80px); }
        .sidebar { width: 280px; background: #16213e; padding: 24px; border-right: 1px solid #0f3460; overflow-y: auto; }
        .sidebar h3 { color: #e94560; margin-bottom: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; background: #0f3460; border: 1px solid #e94560; border-radius: 4px; color: #eee; font-size: 13px; }
        select option { background: #0f3460; }
        .geo-params { display: none; }
        .geo-params.active { display: block; }
        button { width: 100%; padding: 12px; background: #e94560; border: none; border-radius: 4px; color: white; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        button:hover { background: #c73652; }
        .results { margin-top: 16px; padding: 12px; background: #0f3460; border-radius: 4px; display: none; }
        .results h3 { color: #e94560; font-size: 11px; margin-bottom: 8px; letter-spacing: 1px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
        .result-val { color: #4fc3f7; font-weight: bold; }
        .main { flex: 1; padding: 16px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; }
        .plot-box { background: #16213e; border-radius: 8px; border: 1px solid #0f3460; padding: 8px; }
        .plot-box h4 { color: #aaa; font-size: 11px; margin-bottom: 4px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .loading { display: none; text-align: center; color: #e94560; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>
<div class="header">
    <h1>⚙️ FEM Solver</h1>
    <p>2D Plane Stress Analizi — CST Eleman | Gmsh Mesh</p>
</div>
<div class="container">
    <div class="sidebar">
        <h3>Geometri</h3>
        <div class="form-group">
            <label>Geometri Tipi</label>
            <select id="geometry" onchange="updateGeoParams()">
                <option value="rectangular">Dikdörtgen Plaka</option>
                <option value="hole">Delikli Plaka</option>
                <option value="l_shape">L Profil</option>
            </select>
        </div>
        <div class="form-group">
            <label>Genişlik (m)</label>
            <input type="number" id="width" value="1.0" step="0.1">
        </div>
        <div class="form-group">
            <label>Yükseklik (m)</label>
            <input type="number" id="height" value="1.0" step="0.1">
        </div>

        <!-- Delikli plaka parametreleri -->
        <div class="geo-params" id="params-hole">
            <div class="form-group">
                <label>Delik Yarıçapı (m)</label>
                <input type="number" id="hole_radius" value="0.2" step="0.05">
            </div>
        </div>

        <!-- L profil parametreleri -->
        <div class="geo-params" id="params-l_shape">
            <div class="form-group">
                <label>L Kalınlığı (m)</label>
                <input type="number" id="l_thickness" value="0.3" step="0.05">
            </div>
        </div>

        <div class="form-group">
            <label>Mesh Boyutu</label>
            <input type="number" id="mesh_size" value="0.08" step="0.01">
        </div>

        <h3 style="margin-top:14px">Malzeme</h3>
        <div class="form-group">
            <label>Malzeme Seç</label>
            <select id="material" onchange="updateMaterial()">
                <option value="steel">Çelik (S235)</option>
                <option value="aluminum">Alüminyum (Al6061)</option>
                <option value="titanium">Titanyum (Ti-6Al-4V)</option>
                <option value="carbon_fp">Karbon Fiber (CFRP)</option>
                <option value="custom">Özel</option>
            </select>
        </div>
        <div id="custom-material" style="display:none">
            <div class="form-group">
                <label>Young Modülü (GPa)</label>
                <input type="number" id="E" value="210" step="10">
            </div>
            <div class="form-group">
                <label>Poisson Oranı</label>
                <input type="number" id="nu" value="0.3" step="0.01">
            </div>
        </div>
        <div class="form-group">
            <label>Kalınlık (m)</label>
            <input type="number" id="t" value="0.01" step="0.001">
        </div>

        <h3 style="margin-top:14px">Sınır Koşulları</h3>
        <div class="form-group">
            <label>Sabit Kenar</label>
            <select id="fixed_edge">
                <option value="left">Sol</option>
                <option value="right">Sağ</option>
                <option value="bottom">Alt</option>
                <option value="top">Üst</option>
            </select>
        </div>

        <h3 style="margin-top:14px">Yük</h3>
        <div class="form-group">
            <label>Yük Uygulanacak Kenar</label>
            <select id="load_edge">
                <option value="right">Sağ</option>
                <option value="left">Sol</option>
                <option value="top">Üst</option>
                <option value="bottom">Alt</option>
            </select>
        </div>
        <div class="form-group">
            <label>Yük Yönü</label>
            <select id="load_direction">
                <option value="x">+X (sağa)</option>
                <option value="-x">-X (sola)</option>
                <option value="y">+Y (yukarı)</option>
                <option value="-y">-Y (aşağı)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Yük Büyüklüğü (N)</label>
            <input type="number" id="load" value="1000" step="100">
        </div>

        <button onclick="runAnalysis()">▶ ANALİZ ÇALIŞTIR</button>
        <div class="loading" id="loading">⏳ Hesaplanıyor...</div>

        <div class="results" id="results">
            <h3>SONUÇLAR</h3>
            <div class="result-item"><span>Max Deplasman</span><span class="result-val" id="res-disp">—</span></div>
            <div class="result-item"><span>Max Von Mises</span><span class="result-val" id="res-vm">—</span></div>
            <div class="result-item"><span>Node Sayısı</span><span class="result-val" id="res-nodes">—</span></div>
            <div class="result-item"><span>Eleman Sayısı</span><span class="result-val" id="res-elems">—</span></div>
            <div class="result-item"><span>Akma Sınırı</span><span class="result-val" id="res-yield">—</span></div>
            <div class="result-item"><span>Güvenlik Faktörü</span><span class="result-val" id="res-sf">—</span></div>
        </div>
    </div>

    <div class="main">
        <div class="plot-box"><h4>Orijinal Mesh</h4><div id="plot-mesh" style="height:calc(100% - 20px)"></div></div>
        <div class="plot-box"><h4>Deforme Mesh</h4><div id="plot-deformed" style="height:calc(100% - 20px)"></div></div>
        <div class="plot-box" style="grid-column: span 2"><h4>Von Mises Stress Dağılımı</h4><div id="plot-stress" style="height:calc(100% - 20px)"></div></div>
    </div>
</div>

<script>
function updateGeoParams() {
    const geo = document.getElementById('geometry').value;
    document.querySelectorAll('.geo-params').forEach(el => el.classList.remove('active'));
    const el = document.getElementById('params-' + geo);
    if (el) el.classList.add('active');
}

function updateMaterial() {
    const mat = document.getElementById('material').value;
    document.getElementById('custom-material').style.display = mat === 'custom' ? 'block' : 'none';
}

async function runAnalysis() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';

    const data = {
        geometry: document.getElementById('geometry').value,
        material: document.getElementById('material').value,
        width: parseFloat(document.getElementById('width').value),
        height: parseFloat(document.getElementById('height').value),
        hole_radius: parseFloat(document.getElementById('hole_radius').value),
        l_thickness: parseFloat(document.getElementById('l_thickness').value),
        mesh_size: parseFloat(document.getElementById('mesh_size').value),
        E: parseFloat(document.getElementById('E').value) * 1e9,
        nu: parseFloat(document.getElementById('nu').value),
        t: parseFloat(document.getElementById('t').value),
        load: parseFloat(document.getElementById('load').value),
        load_direction: document.getElementById('load_direction').value,
        load_edge: document.getElementById('load_edge').value,
        fixed_edge: document.getElementById('fixed_edge').value,
    };

    const resp = await fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const res = await resp.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('res-disp').textContent = res.max_displacement_mm.toFixed(4) + ' mm';
    document.getElementById('res-vm').textContent = (res.max_von_mises_pa/1e6).toFixed(3) + ' MPa';
    document.getElementById('res-nodes').textContent = res.nodes.length;
    document.getElementById('res-elems').textContent = res.elements.length;
    document.getElementById('res-yield').textContent = res.yield_stress_mpa.toFixed(0) + ' MPa';
    document.getElementById('res-sf').textContent = res.safety_factor.toFixed(2);
    

    const nodes = res.nodes;
    const elems = res.elements;
    const u = res.displacements;
    const vm = res.von_mises;
    const scale = 500;
    const dark = '#16213e';

    // Mesh
    let mx = [], my = [];
    elems.forEach(e => {
        [0,1,2,0].forEach(i => { mx.push(nodes[e[i]][0]); my.push(nodes[e[i]][1]); });
        mx.push(null); my.push(null);
    });
    Plotly.newPlot('plot-mesh', [{x:mx, y:my, mode:'lines', line:{color:'#4fc3f7',width:0.6}, type:'scatter'}],
        {margin:{t:5,b:30,l:40,r:10}, paper_bgcolor:dark, plot_bgcolor:dark, font:{color:'#aaa'}, xaxis:{color:'#aaa'}, yaxis:{color:'#aaa',scaleanchor:'x'}}, {displayModeBar:false});

    // Deforme
    let dx = [], dy = [];
    elems.forEach(e => {
        [0,1,2,0].forEach(i => { dx.push(nodes[e[i]][0]+scale*u[2*e[i]]); dy.push(nodes[e[i]][1]+scale*u[2*e[i]+1]); });
        dx.push(null); dy.push(null);
    });
    Plotly.newPlot('plot-deformed', [{x:dx, y:dy, mode:'lines', line:{color:'#e94560',width:0.6}, type:'scatter'}],
        {margin:{t:5,b:30,l:40,r:10}, paper_bgcolor:dark, plot_bgcolor:dark, font:{color:'#aaa'}, xaxis:{color:'#aaa'}, yaxis:{color:'#aaa',scaleanchor:'x'}}, {displayModeBar:false});

    // Von Mises
    let cx = [], cy = [], vmv = [];
    elems.forEach((e,i) => {
        cx.push((nodes[e[0]][0]+nodes[e[1]][0]+nodes[e[2]][0])/3);
        cy.push((nodes[e[0]][1]+nodes[e[1]][1]+nodes[e[2]][1])/3);
        vmv.push(vm[i]/1e6);
    });
    Plotly.newPlot('plot-stress', [{x:cx, y:cy, mode:'markers',
        marker:{color:vmv, colorscale:'Jet', size:6, colorbar:{title:'MPa', tickfont:{color:'#aaa'}, titlefont:{color:'#aaa'}}}, type:'scatter'}],
        {margin:{t:5,b:30,l:40,r:80}, paper_bgcolor:dark, plot_bgcolor:dark, font:{color:'#aaa'}, xaxis:{color:'#aaa'}, yaxis:{color:'#aaa',scaleanchor:'x'}}, {displayModeBar:false});
}
</script>
</body>
</html>
